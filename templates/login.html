<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        :root {
            --x5-green: #24a148;
            --x5-green-dark: #198038;
            --x5-bg: #f5faf6;
            --x5-text: #1f2937;
            --x5-muted: #6b7280;
            --x5-danger: #b42318;
            --x5-danger-bg: #fff1f2;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background: var(--x5-bg);
            color: var(--x5-text);
            padding: 30px 16px;
        }

        .card {
            max-width: 560px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #d7e9dd;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 12px 26px rgba(15, 23, 42, 0.06);
        }

        h2 { margin: 0 0 8px; }
        .subtitle { margin: 0 0 20px; color: var(--x5-muted); }

        .error {
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            color: var(--x5-danger);
            background: var(--x5-danger-bg);
            border: 1px solid #fecdd3;
            font-size: 14px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #c9d5cf;
            border-radius: 10px;
            background: #fbfdfb;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--x5-green); }

        button {
            width: 100%;
            padding: 12px 16px;
            background: var(--x5-green);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover { background: var(--x5-green-dark); }
    </style>
</head>
<body>
    <div class="card">
        <h2>
            Вход: {% if user_type == 'hr' %}HR{% else %}Соискатель{% endif %}
        </h2>
        <p class="subtitle">Введите ваш логин и пароль, указанные при регистрации.</p>
        <form method="POST">
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <label for="username">Логин:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
